global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "kavita-backend"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - ${APP_METRICS_TARGET:-host.docker.internal:5000}

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: "mysql"
    static_configs:
      - targets: []
